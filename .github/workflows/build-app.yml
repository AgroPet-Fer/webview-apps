name: 🚀 Gerar APK e AAB

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 Nome do app (ex: AgroPet Fer)'
        required: true
        default: 'Meu App'
      package_name:
        description: '🔖 Identificador único (ex: com.agropetfer.app)'
        required: true
        default: 'com.seuapp.webview'
      site_url:
        description: '🌐 URL do site (com https://)'
        required: true
        default: 'https://www.seusite.com.br'
      dominio:
        description: '🔗 Domínio do site (ex: seusite.com.br)'
        required: true
        default: 'seusite.com.br'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Instalar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: ✏️ Personalizar app
        run: |
          PACKAGE="${{ github.event.inputs.package_name }}"
          URL="${{ github.event.inputs.site_url }}"
          DOMINIO="${{ github.event.inputs.dominio }}"
          APP_NAME="${{ github.event.inputs.app_name }}"

          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i \
              -e "s|com\.seuapp\.webview|$PACKAGE|g" \
              -e "s|https://www\.seusite\.com\.br|$URL|g" \
              -e "s|seusite\.com\.br|$DOMINIO|g" \
              -e "s|Meu App|$APP_NAME|g" \
            {} \;

          PASTA_JAVA=$(echo $PACKAGE | tr '.' '/')
          mkdir -p "app/src/main/java/$PASTA_JAVA"
          find app/src/main/java -name "MainActivity.java" \
            -exec cp {} "app/src/main/java/$PASTA_JAVA/" \; 2>/dev/null || true

      - name: 🔑 Recuperar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/meu-keystore.jks

      - name: 📦 Gerar APK
        run: |
          gradle assembleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: 🏪 Gerar AAB
        run: |
          gradle bundleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: 💾 Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: app/build/outputs/apk/release/*.apk

      - name: 💾 Salvar AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-AAB
          path: app/build/outputs/bundle/release/*.aab
