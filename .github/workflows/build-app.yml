name: 🚀 Gerar APK e AAB

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 Nome do app'
        required: true
        default: 'Meu App'
      package_name:
        description: '🔖 Identificador único (ex: com.agropetfer.app)'
        required: true
        default: 'com.agropetfer.app'
      site_url:
        description: '🌐 URL do site (com https://)'
        required: true
        default: 'https://www.seusite.com.br'
      dominio:
        description: '🔗 Domínio (ex: seusite.com.br)'
        required: true
        default: 'seusite.com.br'
      status_bar_color:
        description: '🎨 Cor da barra de status (hex, ex: #1976D2)'
        required: false
        default: '#1976D2'
      icone_url:
        description: '🖼️ URL direta do ícone PNG (opcional — ou suba icone.png na raiz do repo)'
        required: false
        default: ''
      mostrar_barra_progresso:
        description: '⏳ Mostrar barra de progresso ao carregar?'
        required: false
        default: 'sim'
        type: choice
        options:
          - sim
          - nao

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: ✏️ Personalizar app
        run: |
          PACKAGE="${{ github.event.inputs.package_name }}"
          URL="${{ github.event.inputs.site_url }}"
          DOMINIO="${{ github.event.inputs.dominio }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          COR="${{ github.event.inputs.status_bar_color }}"
          BARRA="${{ github.event.inputs.mostrar_barra_progresso }}"

          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i \
              -e "s|com\.seuapp\.webview|$PACKAGE|g" \
              -e "s|com\.agropetfer\.app|$PACKAGE|g" \
              -e "s|https://www\.seusite\.com\.br|$URL|g" \
              -e "s|seusite\.com\.br|$DOMINIO|g" \
              -e "s|Meu App|$APP_NAME|g" \
            {} \;

          # Atualiza cor da barra de status
          COR_LIMPA=$(echo "$COR" | sed 's/#//')
          sed -i "s|colorPrimary\">#[0-9A-Fa-f]*|colorPrimary\">#$COR_LIMPA|g" app/src/main/res/values/colors.xml
          sed -i "s|colorPrimaryDark\">#[0-9A-Fa-f]*|colorPrimaryDark\">#$COR_LIMPA|g" app/src/main/res/values/colors.xml

          # Liga/desliga barra de progresso
          if [ "$BARRA" = "nao" ]; then
            sed -i "s|MOSTRAR_BARRA_PROGRESSO = true|MOSTRAR_BARRA_PROGRESSO = false|g" \
              app/src/main/java/com/seuapp/MainActivity.java 2>/dev/null || true
            find app/src/main/java -name "MainActivity.java" \
              -exec sed -i "s|MOSTRAR_BARRA_PROGRESSO = true|MOSTRAR_BARRA_PROGRESSO = false|g" {} \;
          fi

          # Move MainActivity para o package correto
          PASTA_JAVA=$(echo "$PACKAGE" | tr '.' '/')
          mkdir -p "app/src/main/java/$PASTA_JAVA"
          MAIN=$(find app/src/main/java -name "MainActivity.java" | head -1)
          if [ -n "$MAIN" ]; then
            cp "$MAIN" "app/src/main/java/$PASTA_JAVA/MainActivity.java"
            if [ "$MAIN" != "app/src/main/java/$PASTA_JAVA/MainActivity.java" ]; then
              rm "$MAIN"
            fi
          fi

      - name: 🖼️ Processar ícone
        run: |
          pip install Pillow -q
          python3 processar_icone.py "${{ github.event.inputs.icone_url }}"

      - name: 🔑 Recuperar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/meu-keystore.jks

      - name: 📦 Gerar APK
        run: |
          gradle assembleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: 🏪 Gerar AAB
        run: |
          gradle bundleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: 💾 Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 💾 Salvar AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-AAB-PlayStore
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: ✅ Resumo
        run: |
          echo "### 🎉 App gerado!" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Nome | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 Pacote | ${{ github.event.inputs.package_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Site | ${{ github.event.inputs.site_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Cor barra | ${{ github.event.inputs.status_bar_color }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏳ Barra progresso | ${{ github.event.inputs.mostrar_barra_progresso }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Baixe os arquivos em **Artifacts** acima" >> $GITHUB_STEP_SUMMARY
