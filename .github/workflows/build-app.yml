# ============================================================
#  AUTOMAÇÃO: Gera APK e AAB automaticamente
#  Este arquivo fica na pasta .github/workflows/
#  
#  Como usar:
#  1. Vá em Settings > Secrets no seu repositório GitHub
#  2. Adicione os 4 secrets listados abaixo
#  3. Clique em Actions > Build App > Run workflow
# ============================================================

name: 🚀 Gerar APK e AAB

on:
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 Nome do app (ex: Loja da Maria)'
        required: true
        default: 'Meu App'
      package_name:
        description: '🔖 Identificador único (ex: com.lojadamaria.app)'
        required: true
        default: 'com.seuapp.webview'
      site_url:
        description: '🌐 URL do site (com https://)'
        required: true
        default: 'https://www.seusite.com.br'
      dominio:
        description: '🔗 Domínio do site (sem www e sem https)'
        required: true
        default: 'seusite.com.br'
      versao:
        description: '🔢 Versão do app (ex: 1.0.0)'
        required: false
        default: '1.0.0'

  # Também roda automaticamente quando você envia código para o GitHub
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: 🔨 Compilar e Assinar
    runs-on: ubuntu-latest

    steps:
      # ── Passo 1: Baixa o código do repositório ──
      - name: 📥 Baixar código
        uses: actions/checkout@v4

      # ── Passo 2: Configura o Java (necessário para Android) ──
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Passo 3: Substitui os valores no template ──
      - name: ✏️ Personalizar app
        run: |
          APP_NAME="${{ github.event.inputs.app_name || 'Meu App' }}"
          PACKAGE="${{ github.event.inputs.package_name || 'com.seuapp.webview' }}"
          URL="${{ github.event.inputs.site_url || 'https://www.seusite.com.br' }}"
          DOMINIO="${{ github.event.inputs.dominio || 'seusite.com.br' }}"
          VERSAO="${{ github.event.inputs.versao || '1.0.0' }}"
          
          echo "📦 Pacote: $PACKAGE"
          echo "🌐 URL: $URL"
          
          # Substitui o package name em todos os arquivos
          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i \
              -e "s|com\.seuapp\.webview|$PACKAGE|g" \
              -e "s|com\.seuapp|${PACKAGE%.*}|g" \
              -e "s|https://www\.seusite\.com\.br|$URL|g" \
              -e "s|seusite\.com\.br|$DOMINIO|g" \
              -e "s|Meu App|$APP_NAME|g" \
            {} \;
          
          # Organiza a estrutura de pastas Java
          PASTA_JAVA=$(echo $PACKAGE | tr '.' '/')
          mkdir -p "app/src/main/java/$PASTA_JAVA"
          mv app/src/main/java/com/seuapp/MainActivity.java \
             "app/src/main/java/$PASTA_JAVA/" 2>/dev/null || true

      # ── Passo 4: Recupera o Keystore (arquivo de assinatura) ──
      - name: 🔑 Recuperar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/meu-keystore.jks
          echo "✅ Keystore recuperado"

      # ── Passo 5: Gera o APK ──
      - name: 📦 Gerar APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      # ── Passo 6: Gera o AAB (para Play Store) ──
      - name: 🏪 Gerar AAB (Play Store)
        run: |
          ./gradlew bundleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      # ── Passo 7: Salva os arquivos gerados ──
      - name: 💾 Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 💾 Salvar AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-AAB-PlayStore
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ── Passo 8: Mostra o resumo ──
      - name: ✅ Resumo
        run: |
          echo "### 🎉 App gerado com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Nome | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 Pacote | ${{ github.event.inputs.package_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Site | ${{ github.event.inputs.site_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Baixe os arquivos na aba **Artifacts** acima" >> $GITHUB_STEP_SUMMARY
