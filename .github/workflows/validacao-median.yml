name: 🔐 APK Validação Median

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: 📦 Configurar package name correto
        run: |
          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i \
              -e "s|com\.seuapp\.webview|co.median.android.bnkdelr|g" \
              -e "s|Meu App|AgroPet Fer|g" \
            {} \;

          mkdir -p "app/src/main/java/co/median/android/bnkdelr"
          MAIN=$(find app/src/main/java -name "MainActivity.java" | head -1)
          if [ -n "$MAIN" ]; then
            cp "$MAIN" "app/src/main/java/co/median/android/bnkdelr/MainActivity.java"
            if [ "$MAIN" != "app/src/main/java/co/median/android/bnkdelr/MainActivity.java" ]; then
              rm "$MAIN"
            fi
          fi

      - name: 🎨 Gerar ícones
        run: |
          pip install Pillow -q
          python3 gerar_icones.py

      - name: 🔑 Recuperar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/meu-keystore.jks

      - name: 📦 Gerar APK de validação
        run: |
          gradle assembleRelease \
            -PKEYSTORE_FILE=meu-keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: 💾 Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Validacao-Median
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
